# This file contains pin mappings for the Creality "v4.2.7" board. To
# use this config, during "make menuconfig" select the STM32F103 with
# a "28KiB bootloader" and serial (on USART1 PA10/PA9) communication.

# If you prefer a direct serial connection, in "make menuconfig"
# select "Enable extra low-level configuration options" and select
# serial (on USART3 PB11/PB10), which is broken out on the 10 pin IDC
# cable used for the LCD module as follows:
# 3: Tx, 4: Rx, 9: GND, 10: VCC

# Flash this firmware by copying "out/klipper.bin" to a SD card and
# turning on the printer with the card inserted. The firmware
# filename must end in ".bin" and must not match the last filename
# that was flashed.

# See docs/Config_Reference.md for a description of parameters.

[include mainsail.cfg]

[gcode_macro START_PRINT]
gcode:
    G28
    BED_MESH_PROFILE LOAD=default
    G92 E0
    G1 Z2.0 F3000
    G1 X0.1 Y20 Z0.3 F5000.0
    G1 X0.1 Y200.0 Z0.3 F1500.0 E15
    G1 X0.4 Y200.0 Z0.3 F5000.0
    G1 X0.4 Y20 Z0.3 F1500.0 E30
    G92 E0

[gcode_macro END_PRINT]
description: End print sequence
gcode:
    G91                             ; Relative positioning
    G1 E-2 F2700                    ; Retract a bit
    G1 E-2 Z0.2 F2400               ; Retract and raise Z
    G1 X5 Y5 F3000                  ; Wipe out
    G1 Z10                          ; Raise Z more
    G90                             ; Back to absolute positioning

    G1 X0 Y220 F3000                ; Present print (safe fixed value)

    M106 S0                         ; Turn off fan
    M104 S0                         ; Turn off hotend
    M140 S0                         ; Turn off bed

    M84 X Y E                       ; Disable steppers except Z

[stepper_x]
step_pin: PB9
dir_pin: PC2
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 245
position_min: 0
homing_speed: 50

[stepper_y]
step_pin: PB7
dir_pin: PB8
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 238
position_min: 0
homing_speed: 50

[stepper_z]
step_pin: PB5
dir_pin: !PB6
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -1

[extruder]
max_extrude_only_distance: 100.0
step_pin: PB3
dir_pin: PB4
enable_pin: !PC3
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC5
control: pid
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 250
pressure_advance: 0.08

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

[fan]
pin: PA0

[heater_fan hotend_fan]
pin: PB14
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5.0

[input_shaper]
shaper_freq_x: 42.85
shaper_freq_y: 25.00
shaper_type: mzv

[board_pins]
aliases:
  EXP1_1=PC6,EXP1_3=PB10,EXP1_5=PB14,EXP1_7=PB12,EXP1_9=<GND>,
  EXP1_2=PB2,EXP1_4=PB11,EXP1_6=PB13,EXP1_8=PB15,EXP1_10=<5V>,
  PROBE_IN=PB0,PROBE_OUT=PB1,FIL_RUNOUT=PA4

[bltouch]
sensor_pin: ^PB1        # probe signal input from BLTouch (with pull‑up) :contentReference[oaicite:0]{index=0}
control_pin: PB0        # servo control for deploy/retract :contentReference[oaicite:1]{index=1}
x_offset: -42             # X offset from nozzle (measure your setup)
y_offset: -5.0              # Y offset from nozzle
speed: 5.0
#z_offset: 0

[safe_z_home]
home_xy_position: 150,150
speed: 50
z_hop: 10.0
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 3
mesh_min: 10,10
mesh_max: 200,230
probe_count: 5,5
fade_start: 1.0
fade_end: 10.0
mesh_pps: 2,2
fade_start: 1
fade_end: 10
fade_target: 0

